<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img class="header-logo" src="icons/icon48.png" alt="Chirp">
      <span class="header-title">Chirp</span>
      <button id="page-chat-btn" class="page-chat-btn" title="Chat about this page (Alt+C)">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        Page Chat <kbd>Alt+C</kbd>
      </button>
      <label class="toggle">
        <input type="checkbox" id="enabled-toggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="annotations">Highlights</button>
      <button class="tab-btn" data-tab="settings">Settings</button>
      <button class="tab-btn" data-tab="about">🧡</button>
    </div>

    <div class="tab-panel active" id="panel-annotations">
      <div id="annotations-list"></div>
    </div>

    <div class="tab-panel" id="panel-settings">
      <label for="provider">AI Provider</label>
      <select id="provider">
        <option value="anthropic">Anthropic</option>
        <option value="google">Google Gemini</option>
        <option value="openai">OpenAI</option>
        <option value="openrouter">OpenRouter</option>
      </select>

      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="Enter your API key">

      <label for="model">Model</label>
      <select id="model"></select>

      <label for="customInstructions">Custom Instructions</label>
      <textarea id="customInstructions" placeholder='e.g. "Always respond in Spanish"'></textarea>

      <button id="save">Save</button>
      <div id="status" class="status"></div>
    </div>

    <div class="tab-panel about-panel" id="panel-about">
      <a href="#" id="open-welcome" class="about-link">Getting Started</a>
      <a href="mailto:bentzou@gmail.com?subject=Chirp%20Feedback" class="about-link">Send Feedback</a>
      <a href="https://venmo.com/bentzou" target="_blank" class="about-link">Like the extension? Buy me a coffee ☕</a>
      <div class="about-footer">
        <div id="about-version" class="about-version"></div>
        <div class="about-copyright">© 2025 Chirp</div>
      </div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
