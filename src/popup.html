<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img class="header-logo" src="icons/icon48.png" alt="Chirpy">
      <span class="header-title">Chirpy</span>
      <label class="toggle">
        <input type="checkbox" id="enabled-toggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="annotations">Highlights</button>
      <button class="tab-btn" data-tab="settings">Settings</button>
      <button class="tab-btn" data-tab="about">🧡</button>
    </div>

    <div class="tab-panel active" id="panel-annotations">
      <div id="annotations-list"></div>
    </div>

    <div class="tab-panel" id="panel-settings">
      <label for="provider">AI Provider</label>
      <select id="provider">
        <option value="anthropic">Anthropic</option>
        <option value="google">Google Gemini</option>
        <option value="openai">OpenAI</option>
        <option value="openrouter">OpenRouter</option>
      </select>

      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="Enter your API key">

      <label for="model">Model</label>
      <select id="model"></select>

      <label for="customInstructions">Custom Instructions</label>
      <textarea id="customInstructions" placeholder='e.g. "Always respond in Spanish"'></textarea>

      <button id="save">Save</button>
      <div id="status" class="status"></div>
    </div>

    <div class="tab-panel about-panel" id="panel-about">
      <a href="#" id="open-welcome" class="about-link">Getting Started</a>
      <a href="mailto:bentzou@gmail.com?subject=Chirpy%20Feedback" class="about-link">Send Feedback</a>
      <a href="https://venmo.com/bentzou" target="_blank" class="about-link">Like the extension? Buy me a coffee ☕</a>
      <div class="about-footer">
        <div id="about-version" class="about-version"></div>
        <div class="about-copyright">© 2025 Chirpy</div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
