<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img class="header-logo" src="icons/icon48.png" alt="Chirpy">
      <span class="header-title">Chirpy</span>
      <label class="toggle">
        <input type="checkbox" id="enabled-toggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="annotations">Annotations</button>
      <button class="tab-btn" data-tab="settings">Settings</button>
    </div>

    <div class="tab-panel active" id="panel-annotations">
      <div id="annotations-list"></div>
    </div>

    <div class="tab-panel" id="panel-settings">
      <label for="provider">AI Provider</label>
      <select id="provider">
        <option value="anthropic">Anthropic</option>
        <option value="google">Google Gemini</option>
        <option value="openai">OpenAI</option>
      </select>

      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="Enter your API key">

      <label for="model">Model</label>
      <input type="text" id="model" placeholder="">

      <label for="customInstructions">Custom Instructions</label>
      <textarea id="customInstructions" placeholder='e.g. "Always respond in Spanish"'></textarea>

      <button id="save">Save</button>
      <div id="status" class="status"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
